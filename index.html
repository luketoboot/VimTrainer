<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VimTendo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05080a;
        overflow: hidden;
      }
      #app {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 100%;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        /* focus outline handled in-canvas */
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="screen" tabindex="0"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
